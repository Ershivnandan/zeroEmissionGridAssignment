databases:
  - name: buildable-db
    databaseName: buildable
    user: buildable
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: buildable-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buildable-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: WORKING_SRID
        value: "32614"
      - key: DISPLAY_SRID
        value: "4326"
