services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: buildable
      POSTGRES_PASSWORD: buildable
      POSTGRES_DB: buildable
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildable -d buildable"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://buildable:buildable@db:5432/buildable
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
        NEXT_PUBLIC_MAPTILER_KEY: ${NEXT_PUBLIC_MAPTILER_KEY:-}
        NEXT_PUBLIC_MAP_TILE_URL: https://api.maptiler.com/tiles/satellite-v2/{z}/{x}/{y}.jpg
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
